<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sem conexão — Aquário Municipal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #07111f;
      color: #c9d8ef;
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 24px;
      text-align: center;
    }
    .icon { font-size: 4rem; margin-bottom: 20px; }
    h1 { font-size: 1.4rem; font-weight: 800; color: #fff; margin-bottom: 10px; }
    p  { font-size: .95rem; color: #7a9bbf; line-height: 1.6; max-width: 300px; }
    .btn {
      margin-top: 28px;
      padding: 13px 28px;
      background: #00e5c0;
      color: #07111f;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }
    .btn:active { opacity: .8; }
  </style>
</head>
<body>
  <div class="icon">🤿</div>
  <h1>Você está offline</h1>
  <p>Sem conexão com a internet. Verifique o Wi-Fi ou os dados móveis e tente novamente.</p>
  <button class="btn" onclick="location.reload()">Tentar novamente</button>
</body>
</html>
