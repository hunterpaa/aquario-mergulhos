<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matteus-Sub Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 20% 50%, #0a0f1e, #06090f);
            font-family: 'Segoe UI', 'Courier New', monospace;
            min-height: 100vh;
            padding: 30px 20px;
            color: #c0e0ff;
        }

        /* Efeito de grade futurista */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(#00e6ff08 1px, transparent 1px),
                linear-gradient(90deg, #00e6ff08 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* Header com efeito de água */
        .header {
            background: linear-gradient(135deg, #0a1a2fcc, #061020cc);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid #00e6ff40;
            box-shadow: 0 0 30px rgba(0, 230, 255, 0.15);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '🐠';
            position: absolute;
            font-size: 80px;
            opacity: 0.05;
            right: -20px;
            bottom: -30px;
            transform: rotate(-15deg);
        }

        h1 {
            font-size: 2.8em;
            background: linear-gradient(135deg, #00e6ff, #0088ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px #00e6ff40;
            letter-spacing: 2px;
        }

        .sub {
            color: #5a7a9a;
            margin-top: 8px;
            font-size: 0.9em;
        }

        /* Grid de cards */
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(8, 20, 35, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border: 1px solid #00e6ff30;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: #00e6ff;
            box-shadow: 0 8px 25px rgba(0, 230, 255, 0.2);
        }

        .card-icon {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .card-title {
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #00e6ff;
            margin-bottom: 12px;
        }

        button {
            background: linear-gradient(135deg, #00aaff, #0055dd);
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 1em;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: monospace;
            width: 100%;
            margin-top: 8px;
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 0 15px #00aaff;
        }

        .stop-btn {
            background: linear-gradient(135deg, #ff4444, #aa0000);
        }

        .restart-btn {
            background: linear-gradient(135deg, #ffaa00, #dd8800);
        }

        .status-card {
            background: linear-gradient(135deg, #0a1a2f, #061020);
        }

        .status-led {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.5s infinite;
            margin-right: 8px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .online .status-led {
            background: #00ff00;
            box-shadow: 0 0 8px #00ff00;
        }

        .offline .status-led {
            background: #ff4444;
            animation: none;
        }

        .status-text {
            font-size: 1.4em;
            font-weight: bold;
        }

        /* Logs */
        .log-container {
            background: rgba(2, 8, 18, 0.9);
            border-radius: 20px;
            border: 1px solid #00e6ff30;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .log-header {
            background: linear-gradient(90deg, #00e6ff20, transparent);
            padding: 12px 20px;
            border-bottom: 1px solid #00e6ff30;
            font-weight: bold;
            color: #00e6ff;
        }

        .log-content {
            height: 180px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.8em;
            padding: 12px;
            background: #000000aa;
        }

        .log-full .log-content {
            height: 320px;
        }

        .log-line {
            padding: 4px 8px;
            border-bottom: 1px solid #00e6ff10;
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .log-time {
            color: #00e6ff;
            margin-right: 12px;
        }

        .log-info { color: #88ff88; }
        .log-error { color: #ff8888; }
        .log-warn { color: #ffaa66; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #001a2a; border-radius: 3px; }
        ::-webkit-scrollbar-thumb { background: #00e6ff; border-radius: 3px; }

        /* Botão limpar */
        .clear-btn {
            background: transparent;
            border: 1px solid #00e6ff40;
            color: #00e6ff;
            padding: 4px 12px;
            font-size: 0.75em;
            width: auto;
            margin: 5px 12px 5px auto;
            display: inline-block;
        }

        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🐠 MATTEUS-SUB MANAGER</h1>
        <div class="sub">Deep Sea Control Interface</div>
    </div>

    <div class="controls">
        <div class="card status-card" id="statusCard">
            <div class="card-icon">🟢</div>
            <div class="card-title">STATUS</div>
            <div class="status-text" id="statusText">VERIFICANDO...</div>
        </div>
        <div class="card">
            <div class="card-icon">▶️</div>
            <div class="card-title">INICIAR</div>
            <button id="startBtn">Iniciar Servidor</button>
        </div>
        <div class="card">
            <div class="card-icon">⏹️</div>
            <div class="card-title">PARAR</div>
            <button id="stopBtn" class="stop-btn">Parar Servidor</button>
        </div>
        <div class="card">
            <div class="card-icon">🔄</div>
            <div class="card-title">REINICIAR</div>
            <button id="restartBtn" class="restart-btn">Reiniciar</button>
        </div>
        <div class="card">
            <div class="card-icon">🌐</div>
            <div class="card-title">ABRIR APP</div>
            <button id="openAppBtn">Abrir Matteus-Sub</button>
        </div>
    </div>

    <!-- Mini Log -->
    <div class="log-container">
        <div class="flex-between">
            <div class="log-header">📋 LOG EM TEMPO REAL (Mini)</div>
            <button class="clear-btn" onclick="clearMiniLog()">Limpar</button>
        </div>
        <div class="log-content" id="miniLog"></div>
    </div>

    <!-- Log Completo -->
    <div class="log-container log-full">
        <div class="flex-between">
            <div class="log-header">📄 LOG COMPLETO</div>
            <button class="clear-btn" onclick="clearFullLog()">Limpar</button>
        </div>
        <div class="log-content" id="fullLog"></div>
    </div>
</div>

<script>
    const APP_URL = 'http://localhost:3001';
    let logBuffer = [];
    let statusCheckInterval = null;

    // Elementos
    const statusCard = document.getElementById('statusCard');
    const statusText = document.getElementById('statusText');
    const miniLogDiv = document.getElementById('miniLog');
    const fullLogDiv = document.getElementById('fullLog');

    // Função para adicionar log
    function addLog(message, type = 'info') {
        const now = new Date();
        const time = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
        
        const logLine = `[${time}] ${message}`;
        logBuffer.unshift({ text: logLine, type, timestamp: now });
        
        // Manter máximo 500 logs
        if (logBuffer.length > 500) logBuffer.pop();
        
        // Atualizar mini log (últimas 8)
        const miniLines = logBuffer.slice(0, 8).reverse();
        miniLogDiv.innerHTML = miniLines.map(log => 
            `<div class="log-line"><span class="log-time">${log.text.slice(0,10)}</span><span class="log-${log.type}">${log.text.slice(10)}</span></div>`
        ).join('');
        
        // Atualizar log completo
        const allLines = [...logBuffer].reverse();
        fullLogDiv.innerHTML = allLines.map(log => 
            `<div class="log-line"><span class="log-time">${log.text.slice(0,10)}</span><span class="log-${log.type}">${log.text.slice(10)}</span></div>`
        ).join('');
        
        fullLogDiv.scrollTop = fullLogDiv.scrollHeight;
        miniLogDiv.scrollTop = miniLogDiv.scrollHeight;
    }

    function clearMiniLog() {
        logBuffer = logBuffer.slice(0, 20);
        const miniLines = logBuffer.slice(0, 8).reverse();
        miniLogDiv.innerHTML = miniLines.map(log => 
            `<div class="log-line"><span class="log-time">${log.text.slice(0,10)}</span><span class="log-${log.type}">${log.text.slice(10)}</span></div>`
        ).join('');
        addLog('🧹 Mini log limpo', 'info');
    }

    function clearFullLog() {
        logBuffer = [];
        fullLogDiv.innerHTML = '';
        miniLogDiv.innerHTML = '';
        addLog('🗑️ Log completo limpo', 'warn');
    }

    // Verificar status do servidor
    async function checkStatus() {
        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 2000);
            const response = await fetch(`${APP_URL}/ping`, { 
                method: 'GET',
                signal: controller.signal 
            });
            clearTimeout(timeoutId);
            
            if (response.ok) {
                statusCard.className = 'card status-card online';
                statusText.innerHTML = '🟢 ONLINE';
                return true;
            }
        } catch (error) {
            statusCard.className = 'card status-card offline';
            statusText.innerHTML = '🔴 OFFLINE';
            return false;
        }
    }

    // Executar comandos via VBS (fallback robusto)
    function execCommand(action) {
        addLog(`🚀 Executando: ${action}`, 'info');
        
        try {
            // Criar script VBS temporário
            const shell = new ActiveXObject('WScript.Shell');
            const fso = new ActiveXObject('Scripting.FileSystemObject');
            const currentDir = fso.GetParentFolderName(window.location.pathname);
            
            if (action === 'stop') {
                shell.run('taskkill /F /IM node.exe', 0, true);
                addLog('🛑 Todos os processos Node finalizados', 'warn');
                setTimeout(() => checkStatus(), 1000);
            } 
            else if (action === 'start') {
                addLog('▶️ Iniciando servidor Matteus-Sub...', 'info');
                // Executa na pasta correta
                const cmd = `cmd /c cd /d "${currentDir}" && node server.js`;
                shell.run(cmd, 0, false);
                addLog('⏳ Aguardando servidor iniciar...', 'info');
                setTimeout(() => checkStatus(), 2500);
            }
            else if (action === 'restart') {
                addLog('🔄 Reiniciando servidor...', 'warn');
                shell.run('taskkill /F /IM node.exe', 0, true);
                setTimeout(() => {
                    const cmd = `cmd /c cd /d "${currentDir}" && node server.js`;
                    shell.run(cmd, 0, false);
                    addLog('🔄 Servidor reiniciado', 'info');
                }, 1500);
                setTimeout(() => checkStatus(), 3000);
            }
        } catch(e) {
            addLog(`❌ Erro ao executar: ${e.message}`, 'error');
            addLog('💡 Dica: Use o terminal manualmente', 'warn');
        }
    }

    // Abrir app no navegador
    function openApp() {
        addLog(`🌐 Abrindo ${APP_URL}`, 'info');
        window.open(APP_URL, '_blank');
    }

    // Tentar conectar stream de logs real
    function connectLogStream() {
        try {
            const es = new EventSource(`${APP_URL}/logs/stream`);
            es.onmessage = (event) => {
                addLog(`📡 ${event.data}`, 'info');
            };
            es.onerror = () => {
                addLog('⚠️ Stream de logs real indisponível (usando heartbeat)', 'warn');
                es.close();
                startHeartbeat();
            };
            addLog('✅ Conectado ao stream de logs real', 'info');
        } catch(e) {
            startHeartbeat();
        }
    }

    function startHeartbeat() {
        setInterval(async () => {
            const isOnline = await checkStatus();
            if (isOnline) {
                addLog('💓 Servidor respondendo normalmente', 'info');
            }
        }, 15000);
    }

    // Eventos dos botões
    document.getElementById('startBtn').onclick = () => execCommand('start');
    document.getElementById('stopBtn').onclick = () => execCommand('stop');
    document.getElementById('restartBtn').onclick = () => execCommand('restart');
    document.getElementById('openAppBtn').onclick = openApp;

    // Inicialização
    addLog('🎮 Matteus-Sub Manager v2.0', 'info');
    addLog('🐠 Sistema de gerenciamento iniciado', 'info');
    
    // Verificar status periodicamente
    checkStatus();
    statusCheckInterval = setInterval(() => checkStatus(), 5000);
    connectLogStream();

    // Instrução para permissões
    addLog('⚠️ Para controle total, permita execução de scripts no navegador', 'warn');
    addLog('💡 Se os botões não funcionarem, use o terminal: node server.js', 'warn');
</script>
</body>
</html>
